name: QA

# Runs the full skcomms QA pytest suite on every push to main, every PR, and
# every version tag. The suite is CI-clean (no live external services required),
# so we run it whole.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          pip install -e ".[dev]" || { pip install -e . && pip install pytest pytest-asyncio; }
      - name: Run QA pytest suite
        run: python -m pytest tests/ -q
