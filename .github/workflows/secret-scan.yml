name: secret-scan

# Secret-scan gate: keeps the repo's clean secrets hygiene true over time.
#
# Runs gitleaks (the fleet default, via its official GitHub Action) on every
# push and every pull request. The build FAILS if gitleaks finds anything not
# covered by the baseline allowlist in .gitleaks.toml at the repo root.
#
# The allowlist documents known non-secret placeholder tokens; see that file
# for how to add an entry when a real placeholder trips the scanner. If the
# scanner flags a REAL secret, rotate it and purge it from history, do NOT
# add it to the allowlist.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so a push scans every new commit, not just the tip.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Use the baseline/allowlist committed at the repo root.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for gitleaks-action on GitHub
          # organizations. This repo runs it on an individual account, so no
          # license key is needed. If this repo moves under an org, add the
          # license as a secret and reference it here:
          #   GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
